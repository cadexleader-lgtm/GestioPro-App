version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: gestiopro_db
    environment:
      POSTGRES_DB: gestiopro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: GestioPro2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: